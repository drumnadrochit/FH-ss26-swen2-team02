info:
  name: Create Tour
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/api/tours"
  body:
    type: json
    data: |-
      { 
        "title":"Barmbeker Rundgang",
        "description":"Ein kleiner Rundgang der zum entdecken einlädt. Erkunde Barmbeks schönste Ecken.",
        "from": {
            "latitude":0.00,
            "longitude":0.00,
            "address": "Address A"
        },
        "to": {
            "latitude":0.00,
            "longitude":0.00,
            "address": "Address A"
        },
        "TransportType": 0
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
