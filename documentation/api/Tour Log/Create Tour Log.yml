info:
  name: Create Tour Log
  type: http
  seq: 1

http:
  method: POST
  url: "{{host}}/api/logs"
  body:
    type: json
    data: |-
      {
        "tourId": 3,
        "comment": "Wunderschöne Wanderung, aber anstrengend!",
        "difficulty": 3,
        "distance": 12.5,
        "duration": 3.5,
        "rating": 5
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
