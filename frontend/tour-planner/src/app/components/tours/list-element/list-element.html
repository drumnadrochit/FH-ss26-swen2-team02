<div (focusin)="elementSelected.emit(id())" tabindex="0" class="flex flex-col min-h-20 place-content-between justify-center bg-gray-100 rounded-md p-3 hover:cursor-pointer hover:bg-gray-50 focus:bg-gray-200 focus:outline-2 focus:outline-gray-400">
  <div  class="flex items-center gap-3">
    @switch (type())
    {
      @case ('hike'){
        <svg class="min-w-10 size-6 stroke-gray-800" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="m8 3 4 8 5-5 5 15H2L8 3z"/></svg>
      }
      @case ('bike')
      {
        <svg class="min-w-10 size-6 stroke-gray-800" xmlns="http://www.w3.org/2000/svg"  viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><circle cx="18.5" cy="17.5" r="3.5"/><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="15" cy="5" r="1"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>
      }
    }
    <div class="flex flex-col gap-1 justify-center">
      <h2 class="text-sm/4">{{title()}}</h2>
      <p class="fredo text-xs text-gray-400">{{distance()}} km / {{duration()}} h | {{type()}} </p>
    </div>
  </div>
</div>
