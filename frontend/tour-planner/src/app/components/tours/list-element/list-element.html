<div (click)="elementSelected.emit(id());" (mouseenter)="hover.set(true)" (mouseleave)="hover.set(false)" tabindex="0"
     [class]="'flex flex-col min-h-20 place-content-between justify-center rounded-md p-3 hover:cursor-pointer hover:bg-gray-50 ' + (selected() ? 'bg-gray-200 outline-2 outline-gray-400' : 'bg-gray-100')">
  <div class="flex gap-3 grow items-stretch place-content-between">
    <div class="flex gap-3">

      <app-tour-type-indicator [tourType]="type()"></app-tour-type-indicator>
      <div class="flex flex-col gap-0 justify-center">
        <h2 class="text-sm/4">{{ title() }}</h2>
        <div class="flex gap-2">
          <p class="fredo text-xs text-gray-400">{{ distance() | number:"1.1-2" }} km </p>
          <p class="fredo text-xs text-gray-400">{{ duration() | number:"1.1-2" }} h </p>

        </div>

      </div>
    </div>
    <div tabindex="1" (click)="elementEdit.emit(id()); $event.stopImmediatePropagation()"
         [class]="'flex outline-2 p-2 outline-gray-400 text-gray-400 hover:text-gray-600  hover:outline-gray-600 rounded-sm w-fit animate items-center ' + (hover() ? 'visible': 'invisible')">
      <!--      <svg class="stroke-2 stroke-gray-400 w-7 h-7" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M21.174 6.812a1 1 0 0 0-3.986-3.987L3.842 16.174a2 2 0 0 0-.5.83l-1.321 4.352a.5.5 0 0 0 .623.622l4.353-1.32a2 2 0 0 0 .83-.497z"/><path d="m15 5 4 4"/></svg>-->
      <svg class="stroke-2   w-5 h-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M17.97 9.304A8 8 0 0 0 2 10c0 4.69 4.887 9.562 7.022 11.468"/>
        <path
          d="M21.378 16.626a1 1 0 0 0-3.004-3.004l-4.01 4.012a2 2 0 0 0-.506.854l-.837 2.87a.5.5 0 0 0 .62.62l2.87-.837a2 2 0 0 0 .854-.506z"/>
        <circle cx="10" cy="10" r="3"/>
      </svg>
      <!--      <svg class="stroke-2 stroke-gray-400 w-full h-full" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" ><path d="M10 11v6"/><path d="M14 11v6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>-->
    </div>
  </div>
</div>
