@if(buttonType() == ButtonType.primary)
{
  <button [type]="type()" [disabled]="disabled() || loading()"  class="flex items-center justify-center gap-4 w-12/12 min-h-14 disabled:cursor-not-allowed disabled:bg-sky-300  hover:bg-sky-500 focus:outline-2 focus:outline-offset-2 focus:outline-sky-600 enabled:cursor-pointer  bg-sky-400 p-4 rounded-md text-white ">
    @if (loading()) {
      <img class="size-6 animate-spin" src="spinner.svg" alt="spinner graphic">
      Loading...
    } @else {
      {{  label() }}

    }
  </button>
}

@if(buttonType() == ButtonType.secondary)
{
  <button [type]="type()" [disabled]="disabled() || loading()"  class="flex items-center justify-center gap-4 w-12/12 min-h-10 disabled:cursor-not-allowed disabled:outline-sky-300  hover:outline-sky-600 hover:text-sky-600 focus:bg-sky-100 enabled:cursor-pointer  bg-none outline-sky-400 outline-2 p-3 rounded-md text-sky-400 ">
    @if (loading()) {
      <img class="size-6 animate-spin" src="spinner.svg" alt="spinner graphic">
      Loading...
    } @else {
      {{  label() }}

    }
  </button>
}
