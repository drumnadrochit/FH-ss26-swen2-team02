<button [type]="type()" [disabled]="disabled() || loading()"  class="flex items-center justify-center gap-4 w-12/12 min-h-14 disabled:cursor-not-allowed disabled:bg-sky-300  hover:bg-sky-500 focus:outline-2 focus:outline-offset-2 focus:outline-sky-600 enabled:cursor-pointer  bg-sky-400 p-4 rounded-xl text-white ">
  @if (loading()) {
    <img class="size-6 animate-spin" src="spinner.svg" alt="spinner graphic">
    Loading...
  } @else {
    {{  label() }}

  }
</button>
