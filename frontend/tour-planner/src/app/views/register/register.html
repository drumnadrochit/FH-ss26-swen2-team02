<form [formRoot]="registerForm">
  <div class="w-full min-h-dvh flex items-center justify-center">

    <div class="flex flex-col gap-6 shadow-xl grow max-w-md p-3 rounded-2xl min-h-100">
      <div class="flex place-content-between items-center px-3">
        <h1 class="text-gray-400">Register</h1>
        <a class="text-gray-400 underline text-right text-xs" href="/login">No account? <br /> Register over here.</a>
      </div>
      <hr class="text-gray-200 border-1" />
      <div class="flex flex-col gap-3 grow">
        <input-field label="Username" placeholder="Username" [type]="InputType.text" [formField]="registerForm.username"> </input-field>
        <input-field label="Password" placeholder="********" [type]="InputType.password" [formField]="registerForm.password"> </input-field>

      </div>
      @for (error of  registerForm().errors(); track error.message) {
      <info-card [message]="error.message!"></info-card>

      }
      <input-button [loading]="registerForm().submitting()" label="Register" [disabled]="!isValid()" ></input-button>
    </div>
  </div>

</form>
